name: Build & Push Docker Image

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  # IMAGE_NAME gốc có thể chứa chữ hoa
  IMAGE_NAME: ${{ github.repository }}/mini-ingenium-dotnet

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # BƯỚC QUAN TRỌNG: Chuyển tên Image về chữ thường để tránh lỗi Docker Registry
      - name: Lowercase Registry Image Name
        run: |
          echo "IMAGE_NAME_LOWER=${IMAGE_NAME,,}" >> $GITHUB_ENV
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          # Sử dụng biến đã được lowercase ở đây
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-ingenium:
    runs-on: ubuntu-latest
    needs: build-and-push

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ingenium
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cài đặt cả .NET 7 (cho Otterkit) và .NET 8 (cho App)
      - name: Setup .NET Runtimes
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            7.0.x
            8.0.x

      - name: Install Otterkit
        run: |
          dotnet tool install --global Otterkit --prerelease || dotnet tool install --global Otterkit
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore packages
        run: dotnet restore src/MiniIngenium.csproj

      - name: Compile COBOL
        run: |
          # Otterkit chạy trên .NET 7 sẽ không còn lỗi Exit Code 150
          otterkit build --type library --path cobol/EmployeeRepo.cbl
          echo "COBOL Library Generated"

      - name: Build
        run: |
          dotnet build src/MiniIngenium.csproj -c Release --no-restore
          echo "Build OK"

      - name: Init DB schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d ingenium -f db/schema.sql
          echo "Schema loaded"

      - name: Start API
        env:
          PGHOST: localhost
          PGDATABASE: ingenium
          PGUSER: postgres
          PGPASSWORD: postgres
          ASPNETCORE_URLS: http://+:5000
        run: |
          dotnet run --project src/MiniIngenium.csproj --no-build -c Release &
          
          echo "Waiting for API..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/policy/query?id=1 > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Test Employee Endpoints (Verify COBOL)
        run: |
          echo "=== TEST: ADD EMPLOYEE VIA COBOL ==="
          curl -sf -X POST http://localhost:5000/api/employee/add \
            -H "Content-Type: application/json" \
            -d '{"name": "GitHub Action Bot", "age": 25}' | python3 -m json.tool

          echo "=== TEST: LIST EMPLOYEES ==="
          curl -sf http://localhost:5000/api/employee/list | python3 -m json.tool

      - name: Verify DB Final State
        env:
          PGPASSWORD: postgres
        run: |
          echo "=== CHECKING DB TABLE: EMP ==="
          psql -h localhost -U postgres -d ingenium -c "SELECT * FROM emp;"