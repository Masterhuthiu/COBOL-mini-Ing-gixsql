name: Build & Push Docker Image

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mini-ingenium-dotnet

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-ingenium:
    runs-on: ubuntu-latest
    needs: build-and-push

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ingenium
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 1. CÀI ĐẶT OTTERKIT COMPILER
      - name: Install Otterkit
        run: |
          dotnet tool install --global Otterkit --version 1.0.0-beta.1
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore packages
        run: dotnet restore src/MiniIngenium.csproj

      # 2. BIÊN DỊCH FILE COBOL TRƯỚC KHI BUILD .NET
      - name: Compile COBOL
        run: |
          otterkit build --type library --path cobol/EmployeeRepo.cbl
          echo "COBOL Library Generated"

      - name: Build
        run: |
          dotnet build src/MiniIngenium.csproj -c Release --no-restore
          echo "Build OK"

      - name: Init DB schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d ingenium -f db/schema.sql
          echo "Schema loaded"

      - name: Start API
        env:
          PGHOST: localhost
          PGDATABASE: ingenium
          PGUSER: postgres
          PGPASSWORD: postgres
          ASPNETCORE_URLS: http://+:5000
        run: |
          dotnet run --project src/MiniIngenium.csproj \
            --no-build -c Release &

          echo "Waiting for API..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/policy/query?id=1 > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Test all endpoints
        run: |
          echo "========================================"
          echo "  POLICY QUERY"
          echo "========================================"
          curl -sf "http://localhost:5000/policy/query?id=1" | python3 -m json.tool

          echo "========================================"
          echo "  RATING ENGINE (COBOL logic)"
          echo "========================================"
          curl -sf -X POST http://localhost:5000/policy/rating \
            -H "Content-Type: application/json" \
            -d '{"policyId": 1}' | python3 -m json.tool

          # 3. TEST ENDPOINT EMPLOYEE (GỌI COBOL THẬT)
          echo "========================================"
          echo "  ADD EMPLOYEE (Direct COBOL Call)"
          echo "========================================"
          curl -sf -X POST http://localhost:5000/api/employee/add \
            -H "Content-Type: application/json" \
            -d '{"name": "Nguyen Van COBOL", "age": 35}' | python3 -m json.tool

          echo "========================================"
          echo "  LIST EMPLOYEES"
          echo "========================================"
          curl -sf http://localhost:5000/api/employee/list | python3 -m json.tool

          echo "========================================"
          echo "  BILLING BATCH"
          echo "========================================"
          curl -sf -X POST http://localhost:5000/billing/run-batch \
            -H "Content-Type: application/json" \
            -d '{}' | python3 -m json.tool

      - name: Verify DB final state
        env:
          PGPASSWORD: postgres
        run: |
          echo "=== EMPLOYEE TABLE (Check COBOL Result) ==="
          psql -h localhost -U postgres -d ingenium \
            -c "SELECT * FROM emp;"
          echo "=== POLICY TABLE ==="
          psql -h localhost -U postgres -d ingenium \
            -c "SELECT policy_id, customer, status FROM policy;"