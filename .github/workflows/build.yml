name: COBOL Docker Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Sử dụng Docker Container đã cài sẵn GnuCOBOL và GixSQL
    container:
      image: mridoni/gixsql:latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Database Libraries
        run: |
          # Container đã có sẵn các công cụ, chỉ cần cài thêm header cho DB nếu cần
          apt-get update
          apt-get install -y libpq-dev

      - name: Build Application with Makefile
        run: |
          # Xóa các file cũ
          make clean
          
          # Tạo thư mục build nếu Makefile của bạn yêu cầu
          mkdir -p build
          
          # Chạy lệnh build
          # Makefile sẽ tự động gọi gixsql và cobc có sẵn trong PATH của container
          make

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cobol-executable
          path: app
          retention-days: 5