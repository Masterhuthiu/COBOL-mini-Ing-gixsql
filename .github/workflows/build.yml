name: COBOL Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y gnucobol make gcc postgresql-client

    - name: Install GixSQL
      run: |
        git clone https://github.com/mridoni/gixsql.git
        cd gixsql
        ./configure
        make
        sudo make install

    - name: Build project
      run: |
        make