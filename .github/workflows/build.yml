      - name: Build and Run
        env:
          DOTNET_ROLL_FORWARD: Major
        run: |
          # 1. Biên dịch COBOL sang C# dựa trên otterkit.json
          otterkit build
          
          # 2. Chạy project .NET với mã đã chuyển đổi
          dotnet run --project MyCobolApp.csproj