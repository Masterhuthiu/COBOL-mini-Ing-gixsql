name: Build and Test Otterkit App

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    # Khởi động database PostgreSQL tạm thời
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Cài đặt công cụ biên dịch Otterkit
      - name: Install Otterkit Tool
        run: dotnet tool install --global Otterkit

      # Khôi phục các thư viện (Npgsql, Otterkit.Runtime) khai báo trong .csproj
      - name: Restore dependencies
        run: dotnet restore

      # Tạo bảng trong Postgres để code COBOL không bị lỗi khi chạy
      - name: Initialize Database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d testdb -c "
          CREATE TABLE IF NOT EXISTS emp (
              id SERIAL PRIMARY KEY,
              name TEXT,
              age INT
          );"

      # Biên dịch COBOL và chạy ứng dụng
      - name: Build and Run
        run: |
          otterkit build
          dotnet run --project MyCobolApp.csproj