name: COBOL Build and Install GixSQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gnucobol \
            gcc \
            g++ \
            make \
            autoconf \
            automake \
            libtool \
            flex \
            bison \
            libpq-dev \
            libncurses5-dev \
            libdb-dev

      - name: Install GixSQL from Source
        run: |
          git clone https://github.com/mridoni/gixsql.git
          cd gixsql
          
          # Sửa lỗi thiếu <cstdint> bằng cách chèn vào file ESQLDefinitions.h
          # Lệnh sed này chèn #include <cstdint> vào dòng đầu tiên của file
          sed -i '1i #include <cstdint>' libgixpp/ESQLDefinitions.h
          
          # Tạo file trống để tránh lỗi automake
          touch extra_files.mk 
          
          # Khởi tạo quy trình build
          libtoolize --force
          aclocal
          autoheader
          automake --force-missing --add-missing
          autoconf
          
          # Cấu hình và biên dịch
          ./configure --disable-dependency-tracking
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Build COBOL Project
        run: |
          # Chạy Makefile của dự án bạn
          make clean
          make prep || true
          make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cobol-app
          path: app