name: Otterkit COBOL Build & Test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Otterkit
        run: |
          dotnet tool install --global Otterkit

      - name: Install Npgsql driver
        run: |
          dotnet new console -o cobolapp
          cd cobolapp
          dotnet add package Npgsql

      - name: Setup database schema
        run: |
          psql -h localhost -U postgres -d testdb -c "CREATE TABLE IF NOT EXISTS emp (
            id SERIAL PRIMARY KEY,
            name VARCHAR(100),
            age INT
          );"
        env:
          PGPASSWORD: postgres

      - name: Compile COBOL program
        run: |
          otterkit build src/EmployeeRepo.cob -o cobolapp/bin/Debug/net8.0/EmployeeRepo.dll

      - name: Run COBOL program
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: testdb
        run: |
          dotnet cobolapp/bin/Debug/net8.0/EmployeeRepo.dll
