name: Otterkit COBOL Build & Test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Otterkit
        run: |
          dotnet tool install --global Otterkit --version 1.0.80
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Create Otterkit project
        run: |
          otterkit new application --name cobolapp
          echo "=== Project created ==="
          find cobolapp -type f | sort

      - name: Copy COBOL source into project
        run: |
          cp cobol/main.cbl         cobolapp/src/main.cbl
          cp cobol/EmployeeRepo.cbl cobolapp/src/EmployeeRepo.cbl
          echo "=== src/ contents ==="
          ls -la cobolapp/src/

      - name: Add Npgsql to project
        working-directory: cobolapp
        run: |
          dotnet add package Npgsql --version 8.0.3
          echo "Npgsql added"

      - name: Setup database schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d testdb -c "
            CREATE TABLE IF NOT EXISTS emp (
              id   SERIAL PRIMARY KEY,
              name VARCHAR(100),
              age  INT
            );"
          echo "Schema OK"
          psql -h localhost -U postgres -d testdb -c "\dt"

      - name: Build project
        working-directory: cobolapp
        run: |
          dotnet build -c Debug
          echo "=== Build output ==="
          find bin -type f | sort

      - name: Run COBOL program
        working-directory: cobolapp
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: testdb
        run: |
          dotnet run
          echo "=== Verify DB ==="

      - name: Verify DB
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d testdb \
            -c "SELECT * FROM emp;"