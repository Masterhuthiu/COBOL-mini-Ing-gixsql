name: Otterkit COBOL Build & Test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Otterkit
        run: |
          dotnet new install Otterkit.Templates::1.0.45-alpha
          dotnet tool install --global Otterkit --version 1.0.50-alpha
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Verify Otterkit
        run: otterkit --version

      - name: Create Otterkit project in temp dir
        run: |
          mkdir -p cobolapp
          cd cobolapp
          otterkit new application --name cobolapp
          echo "=== Structure after new (inside cobolapp/) ==="
          find . -type f | sort
          ls -la

      - name: Copy COBOL source into project
        run: |
          cp src/main.cbl         cobolapp/src/main.cbl
          cp src/EmployeeRepo.cbl cobolapp/src/EmployeeRepo.cbl
          echo "=== cobolapp/src/ ==="
          ls -la cobolapp/src/

      - name: Add Npgsql to project
        working-directory: cobolapp
        run: |
          CSPROJ=$(find . -name "*.csproj" | head -1)
          echo "Found: $CSPROJ"
          dotnet add "$CSPROJ" package Npgsql --version 8.0.3

      - name: Setup database schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d testdb -c "
            CREATE TABLE IF NOT EXISTS emp (
              id   SERIAL PRIMARY KEY,
              name VARCHAR(100),
              age  INT
            );"
          echo "Schema OK"
          psql -h localhost -U postgres -d testdb -c "\dt"

      - name: Build project
        working-directory: cobolapp
        run: |
          dotnet build -c Debug
          echo "=== Build output ==="
          find bin -type f 2>/dev/null | sort || true

      - name: Run COBOL program
        working-directory: cobolapp
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: testdb
        run: dotnet run

      - name: Verify DB
        env:
          PGPASSWORD: postgres
        run: |
          echo "=== emp TABLE ==="
          psql -h localhost -U postgres -d testdb \
            -c "SELECT * FROM emp;"