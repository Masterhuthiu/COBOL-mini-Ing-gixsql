name: Build COBOL

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y gnucobol
        sudo apt install -y postgresql-client

    - name: Build project
      run: |
        make