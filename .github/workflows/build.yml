name: Build COBOL

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
            gnucobol \
            build-essential \
            autoconf \
            automake \
            libtool \
            libpq-dev \
            git

    - name: Install Open-COBOL-ESQL
      run: |
        git clone https://github.com/opensourcecobol/Open-COBOL-ESQL.git
        cd Open-COBOL-ESQL
        chmod +x autogen.sh && ./autogen.sh
        export YACC="bison -y"
        export CPPFLAGS="-I/usr/include/postgresql"
        ./configure
        make
        sudo make install
        echo "/usr/local/lib" | sudo tee /etc/ld.so.conf.d/ocesql.conf
        sudo ldconfig
        ldconfig -p | grep ocesql

    - name: Verify install
      run: |
        which ocesql
        ocesql --version
    - name: Fix Source Formatting
      run: |
        # Thêm dòng trống vào cuối tất cả file cbl và cpy nếu chưa có
        find . -name "*.cbl" -exec sed -i -e '$a\' {} \;
        find . -name "*.cpy" -exec sed -i -e '$a\' {} \;
    - name: Copy SQLCA
      run: |
        mkdir -p copy
        cp /usr/local/share/ocesql/sqlca.cbl copy/ || true
        cp /usr/local/share/ocesql/copy/sqlca.cbl copy/ || true

    - name: Build with Makefile
      run: |
        sudo ldconfig
        make
    - name: Build project
      run: |
        make
